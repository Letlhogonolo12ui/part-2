<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mabusela Bags | Contact</title>
    <link rel="stylesheet" type="text/css" href="CSS/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Mabusela <span>Bags</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="Home.html" class="active">Home</a></li>
                <li><a href="About Us.html">About Us</a></li>
                <li><a href="Products & Reviews.html">Products</a></li>
                <li><a href="Shopping Cart & Checkout.html">Cart</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2 class="section-title">Customer Enquiries</h2>
        <div class="contact-container">
            <form onsubmit="handleFormSubmit(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email address" required>
                </div>
                <div class="form-group">
                    <label for="message">Message / Enquiry</label>
                    <textarea id="message" class="form-control" rows="5" placeholder="How can we assist you with our product line?" required></textarea>
                </div>
                <button type="submit" class="btn-gold" style="width: 100%;">Submit Enquiry</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mabusela Bags. All rights reserved.</p>
    </footer>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault();
            alert("Enquiry sent! Mabusela Bags will review your query and reply via email shortly.");
            event.target.reset();
        }
    </script>
</body>
</html>
